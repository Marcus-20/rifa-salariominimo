<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolão Salário Mínimo 💸</title>
    <style>
        :root { --gold: #ffaa00; --dark: #0d0603; }
        body { font-family: sans-serif; background-color: var(--dark); color: #fff; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; text-align: center; }
        .grade { display: grid; grid-template-columns: repeat(10, 1fr); gap: 6px; margin: 25px 0; }
        .numero { aspect-ratio: 1; border: 1px solid #444; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .disponivel { border-color: var(--gold); color: var(--gold); }
        .selecionado { background: var(--gold); color: #000; }
        .pago { background: #333; opacity: 0.4; }
        .box { margin-top: 30px; padding: 20px; background: #1a0f0a; border-radius: 15px; }
        button { width: 95%; padding: 15px; background: var(--gold); border: none; border-radius: 25px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Bolão Salário Mínimo</h1>
        <div class="grade" id="grade-numeros"></div>
        <div id="checkout" class="box" style="display:none;">
            <input type="text" id="nome" placeholder="Nome"><input type="text" id="tel" placeholder="WhatsApp">
            <button onclick="finalizarCompra()">Gerar PIX e Reservar</button>
        </div>
        <div id="pagamento-area" class="box" style="display:none;">
            <h3>Escaneie o QR Code:</h3>
            <img id="qr-code-img" src="" style="width:200px; height:200px; background:white; padding:5px;">
            <textarea id="copia-cola-text" readonly style="width:100%; height:50px; margin:10px 0;"></textarea>
            <button onclick="copiarPix()">Copiar Código PIX</button>
        </div>
    </div>
    <script>
        let selecionados = [];
        async function carregarGrade() {
            const res = await fetch('/api/numeros');
            const data = await res.json();
            const grade = document.getElementById('grade-numeros');
            data.forEach(item => {
                const box = document.createElement('div');
                box.className = 'numero ' + (item.status === 'Disponível' ? 'disponivel' : 'pago');
                box.innerText = item.numero;
                if(item.status === 'Disponível') {
                    box.onclick = () => {
                        if(selecionados.includes(item.numero)) { selecionados = selecionados.filter(n => n !== item.numero); box.classList.remove('selecionado'); }
                        else { selecionados.push(item.numero); box.classList.add('selecionado'); }
                        document.getElementById('checkout').style.display = selecionados.length > 0 ? 'block' : 'none';
                    }
                }
                grade.appendChild(box);
            });
        }
        async function finalizarCompra() {
            const res = await fetch('/api/criar-pagamento', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ nome: document.getElementById('nome').value, telefone: document.getElementById('tel').value, numeros: selecionados })
            });
            const data = await res.json();
            if(data.copia_cola) {
                document.getElementById('checkout').style.display = 'none';
                document.getElementById('pagamento-area').style.display = 'block';
                document.getElementById('copia-cola-text').value = data.copia_cola;
                document.getElementById('qr-code-img').src = "data:image/png;base64," + data.qr_code_base64;
            }
        }
        function copiarPix() { document.getElementById("copia-cola-text").select(); document.execCommand("copy"); alert("Copiado!"); }
        carregarGrade();
    </script>
</body>
</html>
