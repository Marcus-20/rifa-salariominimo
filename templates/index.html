<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salário Mínimo no PIX 💸</title>
    <style>
        :root { --bg-principal: #0d0603; --cor-dourado: #ffaa00; --cor-laranja: #ff5500; --cor-vermelho: #e60000; --cor-texto: #fff5f0; --glass-bg: rgba(25, 12, 6, 0.75); }
        body { font-family: sans-serif; background-color: var(--bg-principal); color: var(--cor-texto); padding: 20px; min-height: 100vh; }
        .container { max-width: 700px; margin: 0 auto; }
        .grade { display: grid; grid-template-columns: repeat(auto-fill, minmax(50px, 1fr)); gap: 10px; background: var(--glass-bg); padding: 20px; border-radius: 20px; }
        .numero { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-weight: 800; border-radius: 10px; cursor: pointer; border: 2px solid transparent; }
        .numero.disponivel { border-color: var(--cor-dourado); color: var(--cor-dourado); }
        .numero.selecionado { background: #fff !important; color: #000 !important; transform: scale(1.1); }
        .numero.reservado { border-color: #ffea00; color: #ffea00; opacity: 0.6; cursor: not-allowed; }
        .numero.pago { border-color: var(--cor-vermelho); color: var(--cor-vermelho); opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="container">
        <h1>💸 BILHETE DA FORTUNA 💸</h1>
        <div class="grade" id="grade-numeros"></div>
    </div>

    <script>
        let selecionados = [];
        async function carregarGrade() {
            const res = await fetch('/api/numeros');
            const numeros = await res.json();
            const grade = document.getElementById('grade-numeros');
            grade.innerHTML = '';
            numeros.forEach(item => {
                const box = document.createElement('div');
                box.innerText = String(item.numero).padStart(2, '0');
                if (item.status === 'Disponível') {
                    box.className = 'numero disponivel';
                    box.onclick = () => alternarNumero(item.numero, box);
                } else if (item.status === 'Reservado') {
                    box.className = 'numero reservado';
                } else {
                    box.className = 'numero pago';
                }
                grade.appendChild(box);
            });
        }
        function alternarNumero(num, box) {
            if (selecionados.includes(num)) {
                selecionados = selecionados.filter(n => n !== num);
                box.classList.remove('selecionado');
            } else {
                selecionados.push(num);
                box.classList.add('selecionado');
            }
        }
        carregarGrade();
    </script>
</body>
</html>
